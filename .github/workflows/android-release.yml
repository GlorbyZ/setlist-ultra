name: Android APK Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Link expo-router for monorepo
        run: |
          mkdir -p node_modules
          if [ -d apps/mobile/node_modules/expo-router ] && [ ! -e node_modules/expo-router ]; then
            ln -s ../apps/mobile/node_modules/expo-router node_modules/expo-router
          fi

      - name: Prebuild Android
        working-directory: apps/mobile
        env:
          CI: "1"
        run: npx expo prebuild --platform android --non-interactive

      - name: Build release APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          cp apps/mobile/android/app/build/outputs/apk/release/app-release.apk setlist-ultra-android.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: setlist-ultra-android.apk
          name: Setlist Ultra ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
