name: Android APK Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Preflight (monorepo + Metro/Babel invariants)
        run: bash apps/mobile/scripts/preflight.sh

      - name: Typecheck
        run: npm run typecheck

      - name: Prebuild Android
        working-directory: apps/mobile
        env:
          CI: "1"
        run: npx expo prebuild --platform android --non-interactive

      - name: Build release APK
        working-directory: apps/mobile/android
        env:
          NODE_ENV: production
        run: ./gradlew assembleRelease --no-daemon

      - name: Verify embedded JS bundle
        run: bash apps/mobile/scripts/verify-apk.sh apps/mobile/android/app/build/outputs/apk/release/app-release.apk

      - name: Rename APK
        run: cp apps/mobile/android/app/build/outputs/apk/release/app-release.apk setlist-ultra-android.apk

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: setlist-ultra-android.apk
          name: Setlist Ultra ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Upload artifact (manual workflow)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: setlist-ultra-android
          path: setlist-ultra-android.apk
